<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="The Kata system. Contributors open pull requests. kata-bot screens them and runs scheduled rounds. The subnet-neutral kata engine scores the king against the candidates and, through per-subnet plugins (SN60 Bitsec, SN22 Desearch, and more), promotes a new king for each subnet. Agents execute in the kata-tee-runner sealed room with miner-paid inference, and kata-board shows the king and the live round.">
  <defs>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1526"/>
      <stop offset="1" stop-color="#0a101f"/>
    </linearGradient>
    <radialGradient id="king" cx="0.5" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#153a2a"/>
      <stop offset="1" stop-color="#101b30"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#5b6b8c"/>
    </marker>
    <style>
      .conn{stroke:url(#pipe);stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:2 11;animation:flow 1.1s linear infinite;}
      .band{fill:#0e1a30;stroke:#2b6cb0;stroke-width:1.4;stroke-dasharray:6 6;opacity:.95;animation:flow 5s linear infinite;}
      .node{fill:#121d33;stroke:#2a3a5c;stroke-width:1.5;}
      .svc{fill:#0f1930;stroke:#26355a;stroke-width:1.4;}
      .kingnode{fill:url(#king);stroke:#2f7d55;stroke-width:1.6;}
      .lab{fill:#e8eef8;font-size:19px;font-weight:600;}
      .sub{fill:#93a4c2;font-size:12px;}
      .clab{fill:#e8eef8;font-size:16px;font-weight:600;}
      .csub{fill:#93a4c2;font-size:11.5px;}
      .kick{fill:#5f7599;font-size:13px;font-weight:600;letter-spacing:3px;}
      .band-t{fill:#7f9bc7;font-size:13px;font-weight:600;}
      .cap{fill:#7e8daa;font-size:12.5px;}
      .aura{fill:#22c55e;animation:glow 2.6s ease-in-out infinite;}
      .dot{fill:#e6f7ff;}
      @keyframes flow{to{stroke-dashoffset:-26;}}
      @keyframes glow{0%,100%{opacity:.22;}50%{opacity:.55;}}
    </style>
  </defs>

  <rect x="8" y="8" width="1184" height="544" rx="20" fill="url(#card)" stroke="#1c2740"/>
  <text x="44" y="56" class="kick">THE KATA SYSTEM &#183; ONE ENGINE, MANY SUBNETS</text>

  <!-- top spine: compete -> orchestrate -> score -> promote -->
  <path class="conn" d="M 258 136 L 336 136" marker-end="url(#ah)"/>
  <path class="conn" d="M 538 136 L 616 136" marker-end="url(#ah)"/>
  <path class="conn" d="M 818 136 L 906 136" marker-end="url(#ah)"/>
  <circle r="4.5" class="dot">
    <animateMotion dur="3.6s" repeatCount="indefinite"
      path="M 62 136 L 258 136 L 336 136 L 538 136 L 616 136 L 818 136 L 906 136 L 1108 136"/>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="3.6s" repeatCount="indefinite"/>
  </circle>

  <rect class="node" x="62" y="96" width="196" height="80" rx="15"/>
  <rect x="62" y="96" width="6" height="80" rx="3" fill="#3b82f6"/>
  <text x="160" y="132" text-anchor="middle" class="lab">Pull Request</text>
  <text x="160" y="153" text-anchor="middle" class="sub">adds one agent</text>

  <rect class="node" x="342" y="96" width="196" height="80" rx="15"/>
  <rect x="342" y="96" width="6" height="80" rx="3" fill="#38bdf8"/>
  <text x="440" y="132" text-anchor="middle" class="lab">kata-bot</text>
  <text x="440" y="153" text-anchor="middle" class="sub">intake + scheduled rounds</text>

  <rect class="node" x="622" y="96" width="196" height="80" rx="15"/>
  <rect x="622" y="96" width="6" height="80" rx="3" fill="#22d3ee"/>
  <text x="720" y="132" text-anchor="middle" class="lab">kata engine</text>
  <text x="720" y="153" text-anchor="middle" class="sub">king vs candidates</text>

  <ellipse cx="1010" cy="136" rx="118" ry="62" class="aura" filter="url(#soft)"/>
  <rect class="kingnode" x="912" y="96" width="196" height="80" rx="15"/>
  <path d="M 989 86 l 7 12 8 -14 8 14 7 -12 -3 20 -24 0 z" fill="#fbbf24"/>
  <text x="1010" y="132" text-anchor="middle" class="lab">New King</text>
  <text x="1010" y="153" text-anchor="middle" class="sub">promoted per subnet</text>

  <!-- engine dispatches to the subnet plugins -->
  <path class="conn" d="M 720 176 L 720 250" marker-end="url(#ah)"/>

  <!-- multi-subnet band -->
  <rect class="band" x="120" y="250" width="620" height="152" rx="16"/>
  <text x="142" y="278" class="band-t">Subnet plugins &#183; discovered via kata.subnets entry points</text>

  <rect class="node" x="146" y="298" width="188" height="86" rx="13"/>
  <circle cx="166" cy="320" r="4" fill="#22c55e"/>
  <text x="240" y="332" text-anchor="middle" class="clab">SN60 &#183; Bitsec</text>
  <text x="240" y="354" text-anchor="middle" class="csub">smart-contract vulns &#183; live</text>

  <rect class="node" x="352" y="298" width="188" height="86" rx="13"/>
  <circle cx="372" cy="320" r="4" fill="#94a3b8"/>
  <text x="446" y="332" text-anchor="middle" class="clab">SN22 &#183; Desearch</text>
  <text x="446" y="354" text-anchor="middle" class="csub">search quality &#183; scaffold</text>

  <rect class="node" x="558" y="298" width="160" height="86" rx="13"/>
  <text x="638" y="332" text-anchor="middle" class="clab">+ more</text>
  <text x="638" y="354" text-anchor="middle" class="csub">future targets</text>

  <!-- shared sealed room -->
  <path class="conn" d="M 240 402 L 285 442" marker-end="url(#ah)"/>
  <rect class="svc" x="120" y="444" width="330" height="80" rx="15"/>
  <path d="M 150 470 h 20 v 24 h -20 z M 154 470 v -6 a 6 6 0 0 1 12 0 v 6" fill="none" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="192" y="478" class="clab">kata-tee-runner</text>
  <text x="192" y="500" class="csub">sealed room &#183; miner-paid inference</text>

  <!-- dashboard reads the state -->
  <path class="conn" d="M 1010 176 L 1010 250" marker-end="url(#ah)"/>
  <rect class="svc" x="912" y="250" width="196" height="80" rx="15"/>
  <text x="1010" y="286" text-anchor="middle" class="clab">kata-board</text>
  <text x="1010" y="308" text-anchor="middle" class="csub">king + live round</text>

  <text x="500" y="474" class="cap">Each subnet keeps its own king in kings/&lt;target&gt;.</text>
  <text x="500" y="496" class="cap">The same engine, rounds, and sealed room serve every target.</text>
</svg>
